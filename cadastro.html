<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro Simples de Itens</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #0f0f0f;
  color: white;
  margin: 0;
  padding: 15px;
}

/* TÍTULO */
h1 {
  color: #00ff88;
  text-align: center;
  margin-bottom: 20px;
}

/* CONTAINERS */
.form-container, .filtro-container {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  border: 1px solid #00ff88;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

/* INPUTS E SELECT */
input, select {
  padding: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
  flex: 1 1 150px;
  background-color: #fff;
  color: black;
}

/* BOTÕES */
button {
  background-color: #00ff88;
  color: black;
  border: none;
  padding: 12px;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
  transform: scale(1.03);
}

/* BOTÃO DELETE */
.btn-delete {
  background: red;
  color: white;
  padding: 6px 10px;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
  background: #1a1a1a;
}

th {
  background-color: #00ff88;
  color: black;
  padding: 10px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #333;
  text-align: center;
}

tr:hover {
  background-color: #262626;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  input, select, button {
    flex: 1 1 100%;
  }
}
</style>
</head>

<body>

<h1>Cadastro de Itens</h1>

<div class="form-container">
  <input type="text" id="codigo" placeholder="Código">
  <input type="text" id="nome" placeholder="Nome">
  <input type="text" id="categoria" placeholder="Categoria">
  <button onclick="adicionarItem()">Adicionar</button>
</div>

<div class="filtro-container">
<label>Ordenar:</label>
<select id="ordenacao" onchange="renderizarTabela()">
  <option value="az">A ao Z</option>
  <option value="za">Z ao A</option>
  <option value="cod_asc">Ordem Crescente</option>
  <option value="cod_desc">Ordem Decrescente</option>
</select>
</div>

<table>
<thead>
<tr>
<th>Código</th>
<th>Nome</th>
<th>Categoria</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabelaItens"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCLfCY7VCgtW92f3Dlqst5yp6BTNqw5UuQ",
  authDomain: "calendario-tucuvori.firebaseapp.com",
  databaseURL: "https://calendario-tucuvori-default-rtdb.firebaseio.com",
  projectId: "calendario-tucuvori",
  storageBucket: "calendario-tucuvori.appspot.com",
  messagingSenderId: "364406314929",
  appId: "1:364406314929:web:ec7e7709bec677690b4f90"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const itensRef = ref(db, "itensSimples");

let listaItens = [];

// ADICIONAR ITEM
window.adicionarItem = function() {
  const item = {
    codigo: document.getElementById("codigo").value,
    nome: document.getElementById("nome").value,
    categoria: document.getElementById("categoria").value,
    criadoEm: Date.now()
  };

  if(!item.nome || !item.codigo) { 
    alert("Preencha o código e o nome!");
    return; 
  }

  push(itensRef, item);
  limparCampos();
}

// PEGAR DADOS EM TEMPO REAL
onValue(itensRef, snapshot => {
  listaItens = [];
  snapshot.forEach(child => {
    listaItens.push({ id: child.key, ...child.val() });
  });
  renderizarTabela();
});

// RENDERIZAR TABELA
window.renderizarTabela = function() {
  const tabela = document.getElementById("tabelaItens");
  tabela.innerHTML = "";
  const tipo = document.getElementById("ordenacao").value;
  let itensOrdenados = [...listaItens];

  switch(tipo){
    case "az": 
      itensOrdenados.sort((a,b)=>a.nome.localeCompare(b.nome)); 
      break;

    case "za": 
      itensOrdenados.sort((a,b)=>b.nome.localeCompare(a.nome)); 
      break;

    case "novo": 
      itensOrdenados.sort((a,b)=>b.criadoEm - a.criadoEm); 
      break;

    case "antigo": 
      itensOrdenados.sort((a,b)=>a.criadoEm - b.criadoEm); 
      break;

    case "cod_asc":
      itensOrdenados.sort((a,b)=>a.codigo.localeCompare(b.codigo));
      break;

    case "cod_desc":
      itensOrdenados.sort((a,b)=>b.codigo.localeCompare(a.codigo));
      break;
  }

  itensOrdenados.forEach(item=>{
    const linha = document.createElement("tr");
    linha.innerHTML = `
      <td>${item.codigo}</td>
      <td>${item.nome}</td>
      <td>${item.categoria}</td>
      <td><button class="btn-delete" onclick="deletarItem('${item.id}')">🗑️</button></td>
    `;
    tabela.appendChild(linha);
  });
}

// DELETAR ITEM
window.deletarItem = function(id){
  const itemRef = ref(db,"itensSimples/"+id);
  remove(itemRef);
}

// LIMPAR CAMPOS
function limparCampos(){
  document.querySelectorAll("input").forEach(input => input.value="");
}
</script>

</body>
</html>
