<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Itens</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #0f0f0f;
  color: white;
  margin: 0;
  padding: 15px;
}

/* TÍTULO */
h1 {
  color: #00ff88;
  text-align: center;
}

/* CONTAINERS */
.form-container, .filtro-container {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  border: 1px solid #00ff88;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}

/* INPUTS */
input, select {
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #fff;
  color: black;
}

/* BOTÕES */
button {
  background-color: #00ff88;
  color: black;
  border: none;
  padding: 12px;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
}

button:hover {
  opacity: 0.85;
}

/* DELETE */
.btn-delete {
  background: red;
  color: white;
}

/* TABELA DESKTOP */
.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1a1a1a;
}

th {
  background: #00ff88;
  color: black;
  padding: 10px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #333;
  text-align: center;
}

/* CARDS MOBILE */
.cards-container {
  display: none;
  gap: 10px;
}

.card {
  background: #1a1a1a;
  border: 1px solid #00ff88;
  border-radius: 10px;
  padding: 10px;
}

.card p {
  margin: 5px 0;
}

/* RESPONSIVO */
@media (max-width: 700px) {

  /* ESCONDE TABELA */
  table {
    display: none;
  }

  /* MOSTRA CARDS */
  .cards-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  /* TÍTULO */
  h1 {
    color: #00ff88;
  text-align: center;
  }

  /* CONTAINERS EM COLUNA */
  .form-container,
  .filtro-container {
    display: flex;
    flex-direction: column;
  }

input {
    width: 95%;
    font-size: 16px;
    padding: 10px;
}

select
    width: 95%;
    font-size: 16px;
    padding: 10px;
  }

button {
   width: 100%;
    font-size: 16px;
    padding: 10px; 
}
  /* CARD */
  .card {
    padding: 12px;
    font-size: 14px;
  }

  .card button {
    width: 100%;
    margin-top: 10px;
  }
}
</style>
</head>

<body>

<h1>Cadastro de Itens</h1>

<div class="form-container">
  <input type="text" id="codigo" placeholder="Código">
  <input type="text" id="nome" placeholder="Nome">
  <input type="text" id="categoria" placeholder="Categoria">
  <button onclick="adicionarItem()">Adicionar</button>
</div>

<div class="filtro-container">
  <select id="ordenacao" onchange="renderizarTabela()">
    <option value="az">A ao Z</option>
    <option value="za">Z ao A</option>
    <option value="cod_asc">Código Crescente</option>
    <option value="cod_desc">Código Decrescente</option>
  </select>
</div>

<!-- TABELA -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Código</th>
<th>Nome</th>
<th>Categoria</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabelaItens"></tbody>
</table>
</div>

<!-- CARDS MOBILE -->
<div class="cards-container" id="cardsItens"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCLfCY7VCgtW92f3Dlqst5yp6BTNqw5UuQ",
  authDomain: "calendario-tucuvori.firebaseapp.com",
  databaseURL: "https://calendario-tucuvori-default-rtdb.firebaseio.com",
  projectId: "calendario-tucuvori",
  storageBucket: "calendario-tucuvori.appspot.com",
  messagingSenderId: "364406314929",
  appId: "1:364406314929:web:ec7e7709bec677690b4f90"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const itensRef = ref(db, "itensSimples");

let listaItens = [];

// ADICIONAR
window.adicionarItem = function() {
  const item = {
    codigo: codigo.value,
    nome: nome.value,
    categoria: categoria.value,
    criadoEm: Date.now()
  };

  if(!item.nome || !item.codigo){
    alert("Preencha os campos!");
    return;
  }

  push(itensRef, item);
  limparCampos();
}

// TEMPO REAL
onValue(itensRef, snapshot => {
  listaItens = [];
  snapshot.forEach(child => {
    listaItens.push({ id: child.key, ...child.val() });
  });
  renderizarTabela();
});

// RENDER
window.renderizarTabela = function() {
  const tabela = document.getElementById("tabelaItens");
  const cards = document.getElementById("cardsItens");

  tabela.innerHTML = "";
  cards.innerHTML = "";

  let itens = [...listaItens];
  const tipo = ordenacao.value;

  switch(tipo){
    case "az": itens.sort((a,b)=>a.nome.localeCompare(b.nome)); break;
    case "za": itens.sort((a,b)=>b.nome.localeCompare(a.nome)); break;
    case "cod_asc": itens.sort((a,b)=>a.codigo.localeCompare(b.codigo)); break;
    case "cod_desc": itens.sort((a,b)=>b.codigo.localeCompare(a.codigo)); break;
  }

  itens.forEach(item => {

    // TABELA
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.codigo}</td>
      <td>${item.nome}</td>
      <td>${item.categoria}</td>
      <td><button class="btn-delete" onclick="deletarItem('${item.id}')">🗑️</button></td>
    `;
    tabela.appendChild(tr);

    // CARD (MOBILE)
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <p><strong>Código:</strong> ${item.codigo}</p>
      <p><strong>Nome:</strong> ${item.nome}</p>
      <p><strong>Categoria:</strong> ${item.categoria}</p>
      <button class="btn-delete" onclick="deletarItem('${item.id}')">Excluir</button>
    `;
    cards.appendChild(card);
  });
}

// DELETAR
window.deletarItem = function(id){
  remove(ref(db, "itensSimples/" + id));
}

// LIMPAR
function limparCampos(){
  document.querySelectorAll("input").forEach(i => i.value = "");
}
</script>

</body>
</html>
